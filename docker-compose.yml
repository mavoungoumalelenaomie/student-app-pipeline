version: '3'
services:
  app:
    build: .
    ports:
      - "5000:5000"
  prometheus:
    image: prom/prometheus
    volumes:
      - /var/jenkins_home/workspace/mon-pipeline/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090"
  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
