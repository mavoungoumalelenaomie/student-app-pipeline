version: '3'
services:
  app:
    build: .
    ports:
      - "5000:5000"
  prometheus:
    image: prom/prometheus
    volumes:
      - /opt/prometheus.yml:/etc/prometheus/prometheus.yml
      - /var/run/docker.sock:/var/run/docker.sock   
      - /usr/bin/docker:/usr/bin/docker 
    ports:
      - "9092:9090"
  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
